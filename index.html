<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>For Mariam</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <canvas id="petals"></canvas>
    <div class="scene" id="scene"></div>

    <div class="stage">
      <div class="message">
        <p class="eyebrow">for you</p>
        <h1 class="name">Mariam</h1>
        <div class="rule">
          <span></span>
          <span class="diamond">✦</span>
          <span></span>
        </div>
        <p class="subtitle">These are the peonies.</p>
        <p class="caption">
          Peonies bloom in May — heavy with petals, impossibly soft,<br />
          so full of themselves they can barely stay upright.<br />
          I think that is you. Love you alot, way more than you love me.
        </p>
      </div>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
